name: Upstream Version Monitor

on:
  schedule:
    # 1st of each month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Run version check
        id: check
        run: |
          set +e
          python scripts/check_versions.py --json > version_report.json
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          echo "report=$(cat version_report.json)" >> "$GITHUB_OUTPUT"

      - name: Print report (human-readable)
        run: python scripts/check_versions.py || true

      - name: Open issue if new versions found
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const report = JSON.parse(process.env.REPORT);
            const newItems = report.findings.filter(
              f => f.status === 'NEW_MAJOR' || f.status === 'NEW_DISTRO'
            );

            const lines = newItems.map(f =>
              `- **${f.component}**: \`${f.latest_tag}\` — ${f.detail}`
            ).join('\n');

            const today = new Date().toISOString().split('T')[0];

            const title = `[compat] New upstream versions detected — ${today}`;

            // Check if an open issue with this title already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'compatibility',
            });

            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              console.log(`Issue already exists: ${duplicate.html_url}`);
              return;
            }

            const body = `## New upstream versions detected

            The monthly version check found components not yet reflected in \`compatibility.yaml\`.

            ### What's new
            ${lines}

            ### Next steps
            1. Review the [semi-annual checklist](docs/semi-annual-checklist.md)
            2. Spin up test VMs and validate the new combo(s)
            3. Update \`px4_doctor/data/compatibility.yaml\` with verified combos
            4. Bump \`meta.last_updated\` in the YAML
            5. Close this issue

            _Generated by the [version-monitor](.github/workflows/version-monitor.yml) workflow._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['compatibility'],
            });
        env:
          REPORT: ${{ steps.check.outputs.report }}
